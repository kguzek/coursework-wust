services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: lab10
      POSTGRES_USER: lab10
      POSTGRES_PASSWORD: lab10
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab10 -d lab10"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      LAB10_DATABASE_URL: postgresql://lab10:lab10@postgres:5432/lab10
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
